<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nighttime</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="panel">

    <header class="header pywebview-drag-region">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 64 64" fill="none">
          <path d="M32 8C18.7 8 8 18.7 8 32s10.7 24 24 24c3.1 0 6-.6 8.6-1.6C33.6 51.3 28 43.2 28 33.5c0-12.7 9.6-23 22-23 1.2 0 2.4.1 3.5.3C50.4 12.3 41.8 8 32 8z" fill="#c8b8ff"/>
        </svg>
        <span class="title">Nighttime</span>
      </div>
      <div style="flex-grow: 1;"></div>
      <span class="badge" style="margin-right: 12px;">Active</span>
      <div id="btn-close" class="close-btn" title="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </div>
    </header>

    <section class="section">
      <div class="slider-row">
        <div class="slider-header">
          <span class="label">Dim</span>
          <span class="value" id="dim-value">0%</span>
        </div>
        <div class="track-wrap" id="dim-track">
          <div class="track-fill" id="dim-fill"></div>
          <div class="thumb" id="dim-thumb"></div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="slider-row">
        <div class="slider-header">
          <span class="label">Redness</span>
          <span class="value" id="red-value">0%</span>
        </div>
        <div class="track-wrap" id="red-track">
          <div class="track-fill red-fill" id="red-fill"></div>
          <div class="thumb red-thumb" id="red-thumb"></div>
        </div>
      </div>
    </section>

    <section class="preview">
      <span class="preview-label">Preview</span>
      <div class="preview-swatch" id="preview-swatch"></div>
    </section>

    <footer class="footer">
      <button class="btn btn-secondary" id="btn-disable">Disable (Esc)</button>
      <button class="btn btn-danger" id="btn-exit">Exit</button>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
